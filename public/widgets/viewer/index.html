<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BumChat Viewer Count Widget</title>
    <!-- Use Socket.IO from CDN -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        /* Transparent background so OBS can overlay it */
        body {
            background-color: transparent;
            margin: 0;
            padding: 10px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #E5E7EB;
            /* gray-200 */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            box-sizing: border-box;
        }

        #viewer-container {
            display: flex;
            gap: 12px;
            background-color: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .platform-count {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .twitch {
            color: #9146FF;
        }

        .kick {
            color: #53FC18;
        }

        .count {
            color: #ffffff;
            font-variant-numeric: tabular-nums;
        }

        /* Icons (using SVG directly to avoid loading external fonts) */
        .icon {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
    </style>
</head>

<body>

    <div id="viewer-container" style="display: none;">
        <!-- Filled dynamically -->
    </div>

    <script>
        // Connect to the Socket.IO server running on the same port
        const socket = io();
        const container = document.getElementById('viewer-container');

        // Parse custom URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const fontSize = urlParams.get('fontSize') || '16px';
        const transparent = urlParams.get('transparent') === 'true';

        container.style.fontSize = fontSize;
        if (transparent) {
            container.style.backgroundColor = 'transparent';
            container.style.border = 'none';
            container.style.boxShadow = 'none';
            container.style.textShadow = '1px 1px 2px black, 0 0 1em black';
        }

        const eyeIcon = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>`;
        const twitchIcon = `<svg class="icon twitch" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2H3v16h5v4l4-4h5l4-4V2zm-10 9V7m5 4V7"/></svg>`;
        const kickIcon = `<svg class="icon kick" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>`;

        function formatCount(count) {
            if (count >= 1000000) return (count / 1000000).toFixed(1) + 'M';
            if (count >= 1000) return (count / 1000).toFixed(1) + 'K';
            return count.toString();
        }

        socket.on('connect', () => {
            console.log('Connected to BumChat Viewer Widget Server');
        });

        socket.on('viewer-count', (data) => {
            const { twitch, kick } = data;

            let totalTwitch = 0;
            let totalKick = 0;

            if (twitch) {
                Object.values(twitch).forEach(c => totalTwitch += (c || 0));
            }
            if (kick) {
                Object.values(kick).forEach(c => totalKick += (c || 0));
            }

            if (totalTwitch === 0 && totalKick === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'flex';
            let html = `<span style="color: #6B7280; margin-right: 4px;">${eyeIcon}</span>`;

            if (totalTwitch > 0) {
                html += `
                    <div class="platform-count">
                        ${twitchIcon}
                        <span class="count">${formatCount(totalTwitch)}</span>
                    </div>
                `;
            }

            if (totalKick > 0) {
                html += `
                    <div class="platform-count">
                        ${kickIcon}
                        <span class="count">${formatCount(totalKick)}</span>
                    </div>
                `;
            }

            container.innerHTML = html;
        });

    </script>
</body>

</html>
